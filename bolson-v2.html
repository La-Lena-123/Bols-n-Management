<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bolsón de Tiempo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Cabinet+Grotesk:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080808; --s1:#111; --s2:#181818; --border:#222;
  --lime:#c8f135; --orange:#f5a623; --cyan:#33d9f0; --pink:#f035c8; --red:#f03535;
  --text:#ececec; --dim:#555; --dim2:#333;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;-webkit-font-smoothing:antialiased;}
body{padding:0 0 100px;}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(8,8,8,0.92);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;padding:10px 16px;gap:8px;
}
.tb-date{font-size:0.6rem;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;}
.tb-date strong{color:var(--orange);font-weight:500;}
.tb-clock{
  font-family:'Cabinet Grotesk',sans-serif;font-weight:900;
  font-size:clamp(1.6rem,5vw,2.4rem);color:var(--lime);
  letter-spacing:-1px;font-variant-numeric:tabular-nums;text-align:center;
}
.tb-clock .tc-colon{animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.tb-clock .tc-sec{font-size:0.55em;color:rgba(200,241,53,.35);vertical-align:super;margin-left:2px;}
.tb-right{text-align:right;}
.tb-cd{font-size:0.58rem;color:var(--dim);letter-spacing:1px;}
.tb-cd span{color:var(--cyan);font-weight:700;}
.tb-cd.warn span{color:var(--red);}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 16px;gap:0;position:sticky;top:61px;z-index:99;background:var(--bg);}
.tab{flex:1;padding:12px 4px;font-family:'Cabinet Grotesk',sans-serif;font-size:0.78rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;color:var(--dim);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--lime);border-bottom-color:var(--lime);}

/* ── ACTIVE SESSION BANNER ── */
.session-banner{
  margin:12px 14px 0;
  background:var(--s1);border:1.5px solid var(--lime);border-radius:var(--r);
  padding:12px 16px;display:none;align-items:center;gap:12px;
  animation:glow-border 2s ease-in-out infinite;
}
.session-banner.visible{display:flex;}
@keyframes glow-border{0%,100%{box-shadow:0 0 0 0 rgba(200,241,53,.2)}50%{box-shadow:0 0 0 6px rgba(200,241,53,0)}}
.sb-dot{width:8px;height:8px;border-radius:50%;background:var(--lime);animation:blink 1s step-end infinite;flex-shrink:0;}
.sb-info{flex:1;}
.sb-name{font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:.85rem;}
.sb-elapsed{font-size:1.1rem;font-weight:700;color:var(--lime);font-variant-numeric:tabular-nums;letter-spacing:2px;}
.sb-stop{background:var(--red);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-family:'DM Mono',monospace;font-weight:500;font-size:.7rem;cursor:pointer;letter-spacing:.5px;white-space:nowrap;}
.sb-stop:active{transform:scale(.96);}

/* ── CONTENT PANEL ── */
.panel{display:none;padding:14px;}
.panel.active{display:block;}

/* ── TODAY VIEW ── */
.today-summary{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;
}
.ts-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;}
.ts-label{font-size:.58rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.ts-val{font-family:'Cabinet Grotesk',sans-serif;font-weight:900;font-size:1.5rem;font-variant-numeric:tabular-nums;}
.ts-val.lime{color:var(--lime);}
.ts-val.orange{color:var(--orange);}
.ts-val.red{color:var(--red);}
.ts-val.cyan{color:var(--cyan);}

.section-title{font-size:.6rem;color:var(--dim);letter-spacing:2.5px;text-transform:uppercase;margin:0 0 10px;padding-left:2px;}

/* ── CATEGORY CARDS ── */
.cat-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.cat-card{
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 14px 12px;cursor:pointer;transition:border-color .2s,transform .15s;
  position:relative;overflow:hidden;
}
.cat-card::after{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--cc,var(--lime));opacity:.9;}
.cat-card.active-card{border-color:var(--cc,var(--lime));transform:translateX(2px);}
.cat-card.exhausted{border-color:var(--red);}
.cat-card.exhausted::after{background:var(--red);}
.cc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.cc-emoji{font-size:1.2rem;flex-shrink:0;}
.cc-name{font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:.88rem;flex:1;}
.cc-meta{text-align:right;font-size:.58rem;color:var(--dim);line-height:1.5;}
.cc-meta strong{color:var(--text);font-weight:500;}
.cc-bars{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.cc-bar-wrap{display:flex;flex-direction:column;gap:3px;}
.cc-bar-label{font-size:.55rem;color:var(--dim);letter-spacing:1px;text-transform:uppercase;}
.cc-track{background:var(--dim2);border-radius:3px;height:5px;overflow:hidden;}
.cc-fill{height:100%;border-radius:3px;transition:width .4s;}
.cc-fill.over{background:var(--red)!important;}
.cc-nums{display:flex;justify-content:space-between;font-size:.58rem;}
.cc-used{color:var(--text);font-weight:700;}
.cc-left{color:var(--dim);}
.cc-left.low{color:var(--orange);}
.cc-left.gone{color:var(--red);}
.cc-btn{
  width:100%;padding:8px;background:transparent;
  border:1px solid var(--cc,var(--lime));color:var(--cc,var(--lime));
  border-radius:8px;font-family:'DM Mono',monospace;font-size:.68rem;font-weight:500;
  letter-spacing:1px;cursor:pointer;transition:background .2s,color .2s;
}
.cc-btn:hover:not(:disabled){background:var(--cc,var(--lime));color:#000;}
.cc-btn:disabled{opacity:.2;cursor:not-allowed;}
.cc-btn.active-btn{background:rgba(200,241,53,.1);color:var(--lime);}

/* ── WEEK VIEW ── */
.week-bars{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.wb-row{display:flex;flex-direction:column;gap:4px;}
.wb-top{display:flex;align-items:center;gap:8px;font-size:.7rem;}
.wb-emoji{font-size:1rem;flex-shrink:0;}
.wb-name{flex:1;color:var(--text);}
.wb-pct{color:var(--dim);font-size:.6rem;font-variant-numeric:tabular-nums;}
.wb-val{font-weight:700;font-variant-numeric:tabular-nums;font-size:.7rem;}
.wb-track{background:var(--dim2);border-radius:4px;height:6px;overflow:hidden;}
.wb-fill{height:100%;border-radius:4px;transition:width .5s;}
.wb-fill.over{background:var(--red)!important;}

/* ── WEEK SUMMARY PILLS ── */
.week-pills{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.wp{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;}
.wp-label{font-size:.52rem;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.wp-val{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:1.1rem;font-variant-numeric:tabular-nums;}

/* ── ACTIONS ── */
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.act-btn{padding:9px 16px;border-radius:8px;font-family:'DM Mono',monospace;font-size:.65rem;font-weight:500;letter-spacing:1px;cursor:pointer;border:1px solid var(--border);background:var(--s1);color:var(--dim);transition:all .2s;}
.act-btn:hover{border-color:var(--text);color:var(--text);}
.act-btn.red-btn:hover{border-color:var(--red);color:var(--red);}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--s2);border:1px solid var(--border);border-radius:20px;
  padding:10px 20px;font-size:.7rem;letter-spacing:.5px;opacity:0;
  transition:opacity .3s,transform .3s;pointer-events:none;z-index:999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(min-width:600px){
  .topbar{padding:12px 24px;}
  .tabs{padding:0 24px;}
  .panel{padding:20px 24px;}
  .session-banner{margin:16px 22px 0;}
  .cat-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .today-summary{grid-template-columns:repeat(4,1fr);}
}
@media(min-width:900px){
  body{max-width:860px;margin:0 auto;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="tb-date" id="tb-date">—</div>
  <div class="tb-clock" id="tb-clock">
    00<span class="tc-colon">:</span>00<span class="tc-sec">00</span>
  </div>
  <div class="tb-right">
    <div class="tb-cd" id="tb-cd">—</div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('today')">Hoy</button>
  <button class="tab" onclick="switchTab('week')">Semana</button>
</div>

<!-- ACTIVE SESSION -->
<div class="session-banner" id="session-banner">
  <div class="sb-dot"></div>
  <div class="sb-info">
    <div class="sb-name" id="sb-name">—</div>
    <div class="sb-elapsed" id="sb-elapsed">00:00:00</div>
  </div>
  <button class="sb-stop" onclick="stopTimer()">■ DETENER</button>
</div>

<!-- TODAY PANEL -->
<div class="panel active" id="panel-today">
  <div class="today-summary">
    <div class="ts-card">
      <div class="ts-label">Hoy usado</div>
      <div class="ts-val lime" id="ts-used">0h</div>
    </div>
    <div class="ts-card">
      <div class="ts-label">Hoy libre</div>
      <div class="ts-val orange" id="ts-free">—</div>
    </div>
    <div class="ts-card">
      <div class="ts-label">Bolsas activas</div>
      <div class="ts-val cyan" id="ts-active">0</div>
    </div>
    <div class="ts-card">
      <div class="ts-label">Alertas</div>
      <div class="ts-val red" id="ts-alerts">0</div>
    </div>
  </div>

  <p class="section-title">Bolsas de tiempo · Toca para iniciar</p>
  <div class="cat-list" id="cat-list"></div>

  <div class="actions">
    <button class="act-btn" onclick="exportData()">⬇ Exportar CSV</button>
    <button class="act-btn red-btn" onclick="resetWeek()">↺ Nueva semana</button>
  </div>
</div>

<!-- WEEK PANEL -->
<div class="panel" id="panel-week">
  <div class="week-pills">
    <div class="wp"><div class="wp-label">Semana</div><div class="wp-val" id="wp-week">—</div></div>
    <div class="wp"><div class="wp-label">Usado</div><div class="wp-val lime" id="wp-used">0h</div></div>
    <div class="wp"><div class="wp-label">Colchón</div><div class="wp-val cyan" id="wp-buffer">—</div></div>
  </div>

  <p class="section-title">Progreso semanal por bolsa</p>
  <div class="week-bars" id="week-bars"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── CATEGORIES ────────────────────────────────────────────
const CATS = [
  {id:'sleep',   emoji:'😴', name:'Sueño',           dailyH:5,     weekH:35,    color:'#7c6af1'},
  {id:'study',   emoji:'📚', name:'Estudio',          dailyH:12,    weekH:84,    color:'#c8f135'},
  {id:'food',    emoji:'🍽', name:'Comida',           dailyH:3,     weekH:21,    color:'#f5a623'},
  {id:'clean',   emoji:'🧹', name:'Limpieza',         dailyH:1,     weekH:7,     color:'#f17c35'},
  {id:'hygiene', emoji:'🚿', name:'Higiene Personal', dailyH:0.75,  weekH:5.25,  color:'#33d9f0'},
  {id:'reading', emoji:'📖', name:'Lectura',          dailyH:0.5,   weekH:3.5,   color:'#43f1a4'},
  {id:'pnl',     emoji:'🧠', name:'PNL',              dailyH:0.5,   weekH:3.5,   color:'#f035c8'},
  {id:'buffer',  emoji:'🛡', name:'Colchón Libre',    dailyH:1.25,  weekH:8.75,  color:'#888'},
];

const DAYS_ES   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ── STATE ─────────────────────────────────────────────────
function freshState() {
  const used = {}; CATS.forEach(c => used[c.id] = 0);
  return {used, weekStart: getWeekStart(), activeId:null, activeStart:null, bufferStart: Date.now()};
}
function loadState() {
  try { const s = localStorage.getItem('bolson_v3'); if(s) return JSON.parse(s); } catch(e){}
  return freshState();
}
function saveState() { try{localStorage.setItem('bolson_v3', JSON.stringify(state));}catch(e){} }
function getWeekStart() {
  const d = new Date(); const day = d.getDay();
  d.setDate(d.getDate() - day + (day===0?-6:1)); d.setHours(0,0,0,0); return d.toISOString();
}

let state = loadState();
let timerInterval = null;
let currentTab = 'today';

// ── HELPERS ───────────────────────────────────────────────
const pad = v => String(v).padStart(2,'0');
function fmtHM(mins) {
  const h=Math.floor(mins/60), m=Math.round(mins%60);
  if(h===0) return `${m}m`; if(m===0) return `${h}h`; return `${h}h ${m}m`;
}
function fmtHMS(secs) { return `${pad(Math.floor(secs/3600))}:${pad(Math.floor((secs%3600)/60))}:${pad(secs%60)}`; }
function fmtH(h) { return h < 1 ? `${Math.round(h*60)}m` : `${h}h`; }

function getSnap() {
  const live = state.bufferStart ? (Date.now()-state.bufferStart)/1000/60 : 0;
  const snap = {};
  CATS.forEach(c => snap[c.id] = (state.used[c.id]||0) + (c.id==='buffer' ? live : 0));
  if (state.activeId && state.activeStart) {
    const liveActive = (Date.now()-state.activeStart)/1000/60;
    snap[state.activeId] = (snap[state.activeId]||0) + liveActive;
  }
  return snap;
}

function showToast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ── TAB ───────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', ['today','week'][i]===tab));
  document.getElementById('panel-today').classList.toggle('active', tab==='today');
  document.getElementById('panel-week').classList.toggle('active', tab==='week');
  renderLive();
}

// ── CLOCK ─────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('tb-clock').innerHTML =
    `${pad(now.getHours())}<span class="tc-colon">:</span>${pad(now.getMinutes())}<span class="tc-sec">${pad(now.getSeconds())}</span>`;
  document.getElementById('tb-date').innerHTML =
    `${DAYS_ES[now.getDay()]} <strong>${now.getDate()} ${MONTHS_ES[now.getMonth()]}</strong>`;

  // Countdown to Sunday 23:59:59
  const end = new Date(now);
  const dts = (7 - now.getDay()) % 7;
  end.setDate(now.getDate() + dts); end.setHours(23,59,59,999);
  const total = Math.max(0, Math.floor((end-now)/1000));
  const dd=Math.floor(total/86400), hh=Math.floor((total%86400)/3600), mm=Math.floor((total%3600)/60), ss=total%60;
  const urgent = dd===0 && hh<3;
  const cdEl = document.getElementById('tb-cd');
  cdEl.className = 'tb-cd' + (urgent?' warn':'');
  cdEl.innerHTML = dd>0
    ? `⏳ ${dd}d <span>${pad(hh)}:${pad(mm)}:${pad(ss)}</span>`
    : `⏳ fin semana <span>${pad(hh)}:${pad(mm)}:${pad(ss)}</span>`;
}

// ── TIMER ─────────────────────────────────────────────────
function flushBuffer() {
  if(state.bufferStart) {
    state.used['buffer'] = (state.used['buffer']||0) + (Date.now()-state.bufferStart)/1000/60;
    state.bufferStart = null;
  }
}
function flushActive() {
  if(state.activeId && state.activeStart) {
    state.used[state.activeId] = (state.used[state.activeId]||0) + (Date.now()-state.activeStart)/1000/60;
    state.activeId = null; state.activeStart = null;
  }
}

function startTimer(id) {
  if(state.activeId === id) { stopTimer(); return; }
  if(state.activeId) flushActive();
  flushBuffer();
  state.activeId = id; state.activeStart = Date.now();
  saveState();
  const cat = CATS.find(c=>c.id===id);
  document.getElementById('sb-name').innerHTML = `${cat.emoji} ${cat.name}`;
  document.getElementById('session-banner').classList.add('visible');
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const el = Math.floor((Date.now()-state.activeStart)/1000);
    document.getElementById('sb-elapsed').textContent = fmtHMS(el);
  }, 1000);
  renderLive();
}

function stopTimer() {
  clearInterval(timerInterval);
  flushActive();
  state.bufferStart = Date.now();
  saveState();
  document.getElementById('session-banner').classList.remove('visible');
  renderLive();
}

function resetWeek() {
  if(!confirm('¿Empezar nueva semana? Se borrará todo el progreso.')) return;
  clearInterval(timerInterval);
  document.getElementById('session-banner').classList.remove('visible');
  state = freshState();
  saveState(); renderLive();
  showToast('✓ Nueva semana iniciada');
}

function exportData() {
  const snap = getSnap();
  let csv = 'Categoría,Diario,Semanal (h),Usado (h),% Semanal\n';
  CATS.forEach(c => {
    const usedH = (snap[c.id]/60).toFixed(2);
    const pct   = (snap[c.id]/(c.weekH*60)*100).toFixed(1);
    csv += `${c.name},${fmtH(c.dailyH)},${c.weekH},${usedH},${pct}%\n`;
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `bolson_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── RENDER ────────────────────────────────────────────────
let renderTick = 0;
function renderLive() {
  const snap = getSnap();
  const now  = new Date();
  // How many minutes have passed today
  const minsToday = now.getHours()*60 + now.getMinutes() + now.getSeconds()/60;
  const totalDailyBudgetMins = CATS.reduce((a,c)=>a+c.dailyH*60,0); // =1440 (24h)
  const totalUsedToday = Object.values(snap).reduce((a,b)=>a+b,0); // all week so far

  // ── TODAY SUMMARY ──
  const snap_used_h = (totalUsedToday/60).toFixed(1);
  document.getElementById('ts-used').textContent = snap_used_h + 'h';
  const freeToday = Math.max(0, 24*60 - totalUsedToday);
  const freeTodayEl = document.getElementById('ts-free');
  freeTodayEl.textContent = fmtHM(freeToday);
  freeTodayEl.className = 'ts-val ' + (freeToday < 60 ? 'red' : freeToday < 180 ? 'orange' : 'orange');

  const activeCats = CATS.filter(c => snap[c.id] > 0).length;
  document.getElementById('ts-active').textContent = activeCats;

  const alerts = CATS.filter(c => snap[c.id] > c.weekH*60).length;
  document.getElementById('ts-alerts').textContent = alerts;

  // ── CATEGORY CARDS ──
  const list = document.getElementById('cat-list');
  list.innerHTML = '';
  CATS.forEach(cat => {
    const usedWeekMins  = snap[cat.id];
    const budgetWeekMins = cat.weekH * 60;
    const usedDayMins   = snap[cat.id]; // simplified: show weekly as proxy for day
    const budgetDayMins = cat.dailyH * 60;
    // Daily progress: estimate as (used / days elapsed this week * 1) 
    const dayOfWeek = now.getDay()===0?7:now.getDay(); // Mon=1..Sun=7
    const daysElapsed = Math.max(1, dayOfWeek - 1) + (now.getHours()/24);
    const expectedDayUsed = usedWeekMins / daysElapsed; // avg per day so far
    const pctDay  = Math.min(100, (expectedDayUsed / budgetDayMins)*100);
    const pctWeek = Math.min(100, (usedWeekMins / budgetWeekMins)*100);
    const over    = usedWeekMins > budgetWeekMins;
    const low     = !over && pctWeek > 80;
    const isActive = state.activeId === cat.id;

    const leftWeek = budgetWeekMins - usedWeekMins;
    const leftStr  = over ? `⚠ +${fmtHM(usedWeekMins-budgetWeekMins)}` : fmtHM(leftWeek);
    const leftClass= over ? 'cc-left gone' : low ? 'cc-left low' : 'cc-left';

    const card = document.createElement('div');
    card.className = 'cat-card' + (isActive?' active-card':'') + (over?' exhausted':'');
    card.style.setProperty('--cc', cat.color);
    card.innerHTML = `
      <div class="cc-top">
        <span class="cc-emoji">${cat.emoji}</span>
        <span class="cc-name">${cat.name}</span>
        <div class="cc-meta">
          <div>${fmtH(cat.dailyH)}<span style="color:var(--dim)">/día</span></div>
          <div>${cat.weekH}h<span style="color:var(--dim)">/sem</span></div>
        </div>
      </div>
      <div class="cc-bars">
        <div class="cc-bar-wrap">
          <div class="cc-bar-label">Hoy (prom.)</div>
          <div class="cc-track"><div class="cc-fill${over?' over':''}" style="width:${pctDay}%;background:${cat.color}"></div></div>
        </div>
        <div class="cc-bar-wrap">
          <div class="cc-bar-label">Semana</div>
          <div class="cc-track"><div class="cc-fill${over?' over':''}" style="width:${pctWeek}%;background:${cat.color}"></div></div>
        </div>
      </div>
      <div class="cc-nums">
        <span class="cc-used">${fmtHM(usedWeekMins)} usados</span>
        <span class="${leftClass}">${leftStr}</span>
      </div>
      <div style="height:10px"></div>
      <button class="cc-btn${isActive?' active-btn':''}" onclick="startTimer('${cat.id}')" ${state.activeId&&!isActive?'disabled':''}>
        ${isActive ? '⏸ PAUSAR' : '▶ INICIAR'}
      </button>`;
    list.appendChild(card);
  });

  // ── WEEK VIEW ──
  const ws = new Date(state.weekStart);
  const we = new Date(ws); we.setDate(ws.getDate()+6);
  const fmt = d=>`${d.getDate()}/${d.getMonth()+1}`;
  document.getElementById('wp-week').textContent = `${fmt(ws)}–${fmt(we)}`;
  document.getElementById('wp-used').textContent = (Object.values(snap).reduce((a,b)=>a+b,0)/60).toFixed(1)+'h';
  const bufLeft = Math.max(0, CATS.find(c=>c.id==='buffer').weekH - snap['buffer']/60);
  document.getElementById('wp-buffer').textContent = bufLeft.toFixed(1)+'h';

  const wbars = document.getElementById('week-bars');
  wbars.innerHTML = '';
  CATS.forEach(cat => {
    const usedH = snap[cat.id]/60;
    const pct   = Math.min(100,(usedH/cat.weekH)*100);
    const over  = usedH > cat.weekH;
    const row = document.createElement('div');
    row.className = 'wb-row';
    row.innerHTML = `
      <div class="wb-top">
        <span class="wb-emoji">${cat.emoji}</span>
        <span class="wb-name">${cat.name}</span>
        <span class="wb-pct">${pct.toFixed(0)}%</span>
        <span class="wb-val" style="color:${over?'var(--red)':cat.color}">${usedH.toFixed(1)}h / ${cat.weekH}h</span>
      </div>
      <div class="wb-track"><div class="wb-fill${over?' over':''}" style="width:${pct}%;background:${cat.color}"></div></div>`;
    wbars.appendChild(row);
  });
}

// ── TICK ──────────────────────────────────────────────────
let tick = 0;
function onTick() {
  tick++;
  updateClock();
  if (tick % 3 === 0) renderLive();              // render every 3s for perf
  if (tick % 60 === 0 && state.bufferStart) {    // persist buffer every 60s
    state.used['buffer'] = (state.used['buffer']||0) + (Date.now()-state.bufferStart)/1000/60;
    state.bufferStart = Date.now();
    saveState();
  }
}

// ── INIT ──────────────────────────────────────────────────
if (!state.bufferStart && !state.activeId) { state.bufferStart = Date.now(); saveState(); }

// Restore active session UI
if (state.activeId && state.activeStart) {
  const cat = CATS.find(c=>c.id===state.activeId);
  document.getElementById('sb-name').innerHTML = `${cat.emoji} ${cat.name}`;
  document.getElementById('session-banner').classList.add('visible');
  timerInterval = setInterval(() => {
    const el = Math.floor((Date.now()-state.activeStart)/1000);
    document.getElementById('sb-elapsed').textContent = fmtHMS(el);
  }, 1000);
}

updateClock();
renderLive();
setInterval(onTick, 1000);
</script>
</body>
</html>
